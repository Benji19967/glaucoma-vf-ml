model:
  # class_path: glaucoma_vf.models.grape_efficient_net.EfficientNetModel
  class_path: glaucoma_vf.models.grape_hyb_vit.HybViT
  init_args:
    lr: 1e-4
data:
  class_path: glaucoma_vf.data.grape.datamodule.GRAPEDataModule
  init_args:
    batch_size: 32
trainer:
  max_epochs: 100
  callbacks:
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      monitor: "val_loss"
      mode: "min"
      save_top_k: 1
      save_last: True
      filename: "best"
